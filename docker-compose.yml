# Full stack — all services in Docker
# For development with HMR, use docker-compose.dev.yml + `LOCAL_GW=1 npm run dev` instead

services:
  editor:
    build:
      context: .
      args:
        VITE_GITHUB_CLIENT_ID: ${VITE_GITHUB_CLIENT_ID:-Ov23li2XoloIy5OdKjKJ}
    ports:
      - "3000:3000"
    environment:
      - ABAPER_HOST=abaper
      - ABAPER_PORT=8080
      - ABAPER_LSP_PORT=8089
    depends_on:
      abaper:
        condition: service_healthy

  abaper:
    image: bluefunda/abaper:beta
    command: ["./abaper", "server", "-p", "8080"]
    ports:
      - "8080:8080"
      - "8089:8089"
    env_file: .env.dev
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s
