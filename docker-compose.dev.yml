# Local development — all backends + gateway + MCP in Docker, frontend runs natively
#
# Usage:
#   cp .env.template .env.dev                        # fill in credentials
#   docker compose -f docker-compose.dev.yml up      # all services
#   LOCAL_GW=1 npm run dev                           # frontend with HMR

services:
  # TypeScript backend — SAP ADT operations (via abap-adt-api)
  abaper-ts:
    build:
      context: ../../Downloads/src/abaper-ts
    ports:
      - "8085:8080"
    env_file: .env.dev
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

  # MCP server — AI tool interface, calls abaper-ts for ADT
  abaper-mcp:
    build:
      context: ../../Downloads/src/abaper-mcp
      args:
        GH_PAT: ${GH_PAT:-}
    ports:
      - "8015:8015"
    environment:
      ABAPER_MODE: sse
      ABAPER_TS_URL: http://abaper-ts:8080
      ABAPER_HTTP_PORT: "8015"
      LOG_LEVEL: info
      LOG_FORMAT: console
    depends_on:
      abaper-ts:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8015/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s

  # Go backend — GitHub API proxy (OAuth, repos, branches, files)
  abaper-go:
    build:
      context: ../../Downloads/src/abaper
      dockerfile_inline: |
        FROM golang:1.25-alpine AS builder
        WORKDIR /app
        COPY go.mod go.sum ./
        RUN go mod download
        COPY . .
        RUN go build -o abaper .
        FROM alpine:latest
        RUN apk --no-cache add ca-certificates
        WORKDIR /app
        COPY --from=builder /app/abaper .
        CMD ["./abaper", "server", "-p", "8086"]
    ports:
      - "8086:8086"
    env_file: .env.dev
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8086/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

  gateway:
    build:
      context: ../../src/abaper-gw
      args:
        ENV: compose
    ports:
      - "8083:8083"
    environment:
      DOMAIN: localhost
      CORS_ALLOWED_ORIGINS: "http://localhost:5173,http://localhost:5174"
    volumes:
      - ./config/krakend-compose.json:/etc/krakend/settings/compose/service.json:ro
    depends_on:
      abaper-ts:
        condition: service_healthy

networks:
  default:
    name: trm-network
    external: true
